# Starter Render Blueprint. Copy to your repo root as render.yaml and edit.
# Full field reference: ../references/render-yaml.md and
# https://render.com/docs/blueprint-spec

previews:
  generation: automatic # spin up a preview environment per pull request
  expireAfterDays: 3

envVarGroups:
  - name: shared-config
    envVars:
      - key: LOG_LEVEL
        value: info
      - key: SENTRY_DSN
        sync: false # set the real value in the dashboard, do not commit it

services:
  # Public web service
  - type: web
    name: my-api
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    preDeployCommand: npm run migrate # runs after build, before traffic shifts
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: my-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - fromGroup: shared-config

  # Background worker (no inbound traffic)
  - type: worker
    name: my-worker
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: node dist/worker.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: my-db
          property: connectionString
      - fromGroup: shared-config

  # Scheduled job
  - type: cron
    name: nightly-cleanup
    runtime: node
    schedule: "0 3 * * *" # 03:00 UTC daily
    buildCommand: npm ci
    startCommand: node scripts/cleanup.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: my-db
          property: connectionString

databases:
  - name: my-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: [] # internal-only: reach it via SSH on a service, not locally
